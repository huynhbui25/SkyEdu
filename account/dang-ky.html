<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - SKY EDU</title>
    <meta name="theme-color" content="#050B1A">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='45' fill='%2300BFFF'/%3E%3Cpath d='M30 150C60 150 90 130 120 90C135 70 150 45 165 15C135 30 105 45 90 60C60 90 30 120 30 150Z' fill='%233B82F6'/%3E%3Cpath d='M50 150C70 150 90 135 105 115C115 100 125 80 135 60C110 70 90 80 75 95C50 120 50 135 50 150Z' fill='white'/%3E%3C/svg%3E">
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Premium CSS -->
    <link rel="stylesheet" href="../assets/css/premium-style.css">
    
    <!-- Iconify -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    
    <style>
        :root { --page-bg: #070D1F; }
        
        .page-bg { position: fixed; inset: 0; z-index: 0; background: var(--page-bg); }
        .bg-gradient { position: fixed; top: -50%; left: 50%; transform: translateX(-50%); width: 150%; height: 100%; background: radial-gradient(ellipse at center top, rgba(0, 212, 255, 0.12) 0%, rgba(59, 130, 246, 0.08) 30%, rgba(139, 92, 246, 0.05) 50%, transparent 70%); pointer-events: none; z-index: 0; }
        .bg-grid { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px); background-size: 80px 80px; pointer-events: none; }
        .floating-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: float 20s ease-in-out infinite; }
        .orb-1 { width: 400px; height: 400px; background: rgba(0, 212, 255, 0.15); top: 10%; left: 10%; }
        .orb-2 { width: 300px; height: 300px; background: rgba(139, 92, 246, 0.12); bottom: 20%; right: 15%; animation-delay: -7s; }
        @keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); } 25% { transform: translate(30px, -30px) scale(1.05); } 50% { transform: translate(-20px, 20px) scale(0.95); } 75% { transform: translate(20px, 30px) scale(1.02); } }

        .auth-wrapper { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

        .auth-card { width: 100%; max-width: 440px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 40px; animation: fadeInUp 0.8s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .auth-logo { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 28px; }
        .auth-logo svg { filter: drop-shadow(0 0 10px rgba(0, 191, 255, 0.4)); }
        .auth-logo-text { display: flex; flex-direction: column; }
        .auth-logo-title { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #fff 0%, #00BFFF 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .auth-logo-subtitle { font-size: 10px; color: #94A3B8; font-weight: 500; letter-spacing: 0.5px; }

        .auth-header { text-align: center; margin-bottom: 28px; }
        .auth-title { font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 6px; }
        .auth-subtitle { font-size: 14px; color: #94A3B8; }

        .auth-form { display: flex; flex-direction: column; gap: 16px; }

        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-label { font-size: 12px; font-weight: 600; color: #E2E8F0; display: flex; align-items: center; gap: 6px; }
        .form-label iconify-icon { color: #00D4FF; font-size: 14px; }
        .form-input { padding: 12px 14px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; font-size: 14px; color: #fff; transition: all 0.3s ease; }
        .form-input::placeholder { color: #64748B; }
        .form-input:focus { outline: none; border-color: #00D4FF; box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15); }

        .form-hint { font-size: 11px; color: #64748B; margin-top: 4px; line-height: 1.4; }

        .form-checkbox { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .form-checkbox input { width: 16px; height: 16px; border-radius: 4px; cursor: pointer; }
        .form-checkbox span { font-size: 13px; color: #94A3B8; }

        .form-btn { padding: 14px 24px; background: linear-gradient(135deg, #00D4FF, #3B82F6); border: none; border-radius: 10px; font-size: 15px; font-weight: 700; color: #050B1A; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; }
        .form-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0, 191, 255, 0.3); }
        .form-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .form-footer { text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.08); }
        .form-footer p { font-size: 13px; color: #94A3B8; }
        .form-footer a { color: #00D4FF; font-weight: 600; text-decoration: none; }
        .form-footer a:hover { color: #8B5CF6; }

        .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 10px; font-weight: 600; font-size: 14px; z-index: 99999; animation: fadeInDown 0.3s ease; max-width: 90%; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
        .toast.success { background: #10B981; color: white; }
        .toast.error { background: #EF4444; color: white; }
        @keyframes fadeInDown { from { transform: translateX(-50%) translateY(-20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        @keyframes fadeOutUp { from { transform: translateX(-50%) translateY(0); opacity: 1; } to { transform: translateX(-50%) translateY(-20px); opacity: 0; } }

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .auth-card { padding: 28px 20px; }
            .auth-title { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="page-bg"></div>
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <svg width="48" height="48" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 26C12 26 18 22 22 16C24 13 26 9 28 4C23 6 19 8 16 10C10 14 6 20 6 26Z" fill="#38BDF8"/>
                    <path d="M10 26C14 26 18 23 21 19C22.5 17 24 14 25 11C21 12 18 13.5 16 15C12 18 10 22 10 26Z" fill="#1677FF"/>
                </svg>
                <div class="auth-logo-text">
                    <span class="auth-logo-title">SKY EDU</span>
                    <span class="auth-logo-subtitle">Fly Higher • Think Better</span>
                </div>
            </div>

            <div class="auth-header">
                <h1 class="auth-title">Đăng ký tài khoản</h1>
                <p class="auth-subtitle">Tạo tài khoản để bắt đầu học tập</p>
            </div>

            <form class="auth-form" id="registerForm">
                <div class="form-group">
                    <label class="form-label">
                        <iconify-icon icon="lucide:user"></iconify-icon>
                        Họ và tên
                    </label>
                    <input type="text" class="form-input" id="fullname" placeholder="Nhập họ và tên" required>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <iconify-icon icon="lucide:at-sign"></iconify-icon>
                        Tên đăng nhập
                    </label>
                    <input type="text" class="form-input" id="username" placeholder="Nhập tên đăng nhập" required minlength="6">
                    <span class="form-hint">Tối thiểu 6 ký tự (chữ thường, số, gạch dưới)</span>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <iconify-icon icon="lucide:lock"></iconify-icon>
                        Mật khẩu
                    </label>
                    <input type="password" class="form-input" id="password" placeholder="Nhập mật khẩu" required>
                    <span class="form-hint">Tối thiểu 8 ký tự, gồm chữ hoa, chữ thường, số và ký tự đặc biệt</span>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <iconify-icon icon="lucide:lock"></iconify-icon>
                        Xác nhận mật khẩu
                    </label>
                    <input type="password" class="form-input" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                </div>

                <label class="form-checkbox">
                    <input type="checkbox" id="agree-terms" required>
                    <span>Tôi đồng ý với điều khoản sử dụng</span>
                </label>

                <button type="submit" class="form-btn" id="registerBtn">
                    <iconify-icon icon="lucide:user-plus"></iconify-icon>
                    Đăng ký
                </button>
            </form>

            <div class="form-footer">
                <p>Đã có tài khoản? <a href="dang-nhap.html">Đăng nhập</a></p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="../firebase-config.js"></script>
    <script src="../assets/js/data-validator.js"></script>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullname = document.getElementById('fullname').value.trim();
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            const agreeTerms = document.getElementById('agree-terms').checked;
            const btn = document.getElementById('registerBtn');
            const originalContent = btn.innerHTML;

            let errors = [];
            if (!fullname) errors.push('Vui lòng nhập họ và tên');
            if (!username) errors.push('Vui lòng nhập tên đăng nhập');
            if (username && username.length < 6) errors.push('Tên đăng nhập phải từ 6 ký tự trở lên');
            if (username && !/^[a-z0-9_]{6,}$/.test(username)) errors.push('Tên đăng nhập chỉ chứa chữ thường, số và gạch dưới');
            if (!password) errors.push('Vui lòng nhập mật khẩu');
            if (password && !/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&.#]).{8,}$/.test(password)) errors.push('Mật khẩu phải có ít nhất 8 ký tự, gồm chữ hoa, chữ thường, số và ký tự đặc biệt');
            if (password !== confirmPassword) errors.push('Mật khẩu xác nhận không khớp');
            if (!agreeTerms) errors.push('Bạn phải đồng ý với điều khoản sử dụng');
            
            if (errors.length > 0) {
                showNotification(errors[0], 'error');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<iconify-icon icon="lucide:loader-2" class="spin"></iconify-icon> Đang xử lý...';
            
            try {
                const existingUser = await FirebaseAPI.getUserByUsername(username);
                if (existingUser) {
                    showNotification('Tên đăng nhập này đã được sử dụng!', 'error');
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                    return;
                }
                
                const result = await FirebaseAPI.createUser(username + '@skyedu.id.vn', password, fullname, username);
                
                if (result.success) {
                    showNotification('Đăng ký thành công! Đang chuyển đến trang đăng nhập...', 'success');
                    setTimeout(() => { window.location.href = 'dang-nhap.html'; }, 1500);
                } else {
                    showNotification(result.error, 'error');
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                }
            } catch (error) {
                console.error('Lỗi:', error);
                showNotification('Đã xảy ra lỗi. Vui lòng thử lại!', 'error');
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        });
        
        function showNotification(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeOutUp 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }
    </script>
</body>
</html>
