<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - SKY EDU</title>
    <meta name="theme-color" content="#050B1A">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='45' fill='%2300BFFF'/%3E%3Cpath d='M30 150C60 150 90 130 120 90C135 70 150 45 165 15C135 30 105 45 90 60C60 90 30 120 30 150Z' fill='%233B82F6'/%3E%3Cpath d='M50 150C70 150 90 135 105 115C115 100 125 80 135 60C110 70 90 80 75 95C50 120 50 135 50 150Z' fill='white'/%3E%3C/svg%3E">
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Premium CSS -->
    <link rel="stylesheet" href="../assets/css/premium-style.css">
    
    <!-- Iconify -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    
    <style>
        /* =========================================
           AUTH PAGE STYLES
           ========================================= */
        :root {
            --page-bg: #070D1F;
        }
        
        .page-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: var(--page-bg);
        }

        .bg-gradient {
            position: fixed;
            top: -50%;
            left: 50%;
            transform: translateX(-50%);
            width: 150%;
            height: 100%;
            background: radial-gradient(ellipse at center top, rgba(0, 212, 255, 0.12) 0%, rgba(59, 130, 246, 0.08) 30%, rgba(139, 92, 246, 0.05) 50%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 80px 80px;
            pointer-events: none;
        }

        .floating-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(0, 212, 255, 0.15);
            top: 10%;
            left: 10%;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: rgba(139, 92, 246, 0.12);
            bottom: 20%;
            right: 15%;
            animation-delay: -7s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }

        /* =========================================
           AUTH CONTAINER
           ========================================= */
        .auth-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px 40px;
            animation: fadeInUp 0.8s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 32px;
        }

        .auth-logo svg {
            filter: drop-shadow(0 0 10px rgba(0, 191, 255, 0.4));
        }

        .auth-logo-text {
            display: flex;
            flex-direction: column;
        }

        .auth-logo-title {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #00BFFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-logo-subtitle {
            font-size: 10px;
            color: #94A3B8;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 15px;
            color: #94A3B8;
        }

        /* =========================================
           FORM STYLES
           ========================================= */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #E2E8F0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-label iconify-icon {
            color: #00D4FF;
            font-size: 16px;
        }

        .form-input {
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 15px;
            color: #fff;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: #64748B;
        }

        .form-input:focus {
            outline: none;
            border-color: #00D4FF;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15);
        }

        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .form-checkbox input {
            width: 18px;
            height: 18px;
            border-radius: 6px;
            cursor: pointer;
        }

        .form-checkbox span {
            font-size: 14px;
            color: #94A3B8;
        }

        .form-btn {
            padding: 16px 24px;
            background: linear-gradient(135deg, #00D4FF, #3B82F6);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            color: #050B1A;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }

        .form-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 191, 255, 0.3);
        }

        .form-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .form-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .form-footer p {
            font-size: 14px;
            color: #94A3B8;
        }

        .form-footer a {
            color: #00D4FF;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .form-footer a:hover {
            color: #8B5CF6;
        }

        /* =========================================
           TOAST NOTIFICATION
           ========================================= */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            z-index: 99999;
            animation: fadeInDown 0.3s ease;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .toast.success { background: #10B981; color: white; }
        .toast.error { background: #EF4444; color: white; }
        .toast.info { background: #3B82F6; color: white; }

        @keyframes fadeInDown {
            from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        @keyframes fadeOutUp {
            from { transform: translateX(-50%) translateY(0); opacity: 1; }
            to { transform: translateX(-50%) translateY(-20px); opacity: 0; }
        }

        /* =========================================
           RESPONSIVE
           ========================================= */
        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 24px;
            }
            
            .auth-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="page-bg"></div>
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <svg width="48" height="48" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 26C12 26 18 22 22 16C24 13 26 9 28 4C23 6 19 8 16 10C10 14 6 20 6 26Z" fill="#38BDF8"/>
                    <path d="M10 26C14 26 18 23 21 19C22.5 17 24 14 25 11C21 12 18 13.5 16 15C12 18 10 22 10 26Z" fill="#1677FF"/>
                </svg>
                <div class="auth-logo-text">
                    <span class="auth-logo-title">SKY EDU</span>
                    <span class="auth-logo-subtitle">Fly Higher • Think Better</span>
                </div>
            </div>

            <!-- Header -->
            <div class="auth-header">
                <h1 class="auth-title">Đăng nhập</h1>
                <p class="auth-subtitle">Vui lòng đăng nhập để tiếp tục</p>
            </div>

            <!-- Form -->
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label">
                        <iconify-icon icon="lucide:user"></iconify-icon>
                        Tên đăng nhập
                    </label>
                    <input type="text" class="form-input" id="username" placeholder="Nhập tên đăng nhập" required>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <iconify-icon icon="lucide:lock"></iconify-icon>
                        Mật khẩu
                    </label>
                    <input type="password" class="form-input" id="password" placeholder="Nhập mật khẩu" required>
                </div>

                <label class="form-checkbox">
                    <input type="checkbox" id="remember">
                    <span>Ghi nhớ đăng nhập</span>
                </label>

                <button type="submit" class="form-btn" id="loginBtn">
                    <iconify-icon icon="lucide:log-in"></iconify-icon>
                    Đăng nhập
                </button>
            </form>

            <!-- Footer -->
            <div class="form-footer">
                <p>Chưa có tài khoản? <a href="dang-ky.html">Đăng ký ngay</a></p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="../firebase-config.js"></script>
    <script src="../assets/js/data-validator.js"></script>
    
    <script>
        // Initialize login form when DOM and Firebase are ready
        function initLoginForm() {
            const form = document.getElementById('loginForm');
            if (!form) return;
            
            // Remove any existing listeners to avoid duplicates
            const newForm = form.cloneNode(true);
            form.parentNode.replaceChild(newForm, form);
            
            newForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('username').value.trim().toLowerCase();
                const password = document.getElementById('password').value.trim();
                const btn = document.getElementById('loginBtn');
                const originalContent = btn.innerHTML;
                
                if (!username || !password) {
                    showNotification('Vui lòng nhập đầy đủ thông tin!', 'error');
                    return;
                }
                
                btn.disabled = true;
                btn.innerHTML = '<iconify-icon icon="lucide:loader-2" class="spin"></iconify-icon> Đang đăng nhập...';
                
                try {
                    const email = username + '@skyedu.id.vn';
                    const userCred = await firebase.auth().signInWithEmailAndPassword(email, password);
                    const uid = userCred.user.uid;
                    
                    const snapshot = await firebase.database().ref('users/' + uid).once('value');
                    const userData = snapshot.val();
                    
                    if (!userData) {
                        await firebase.auth().signOut();
                        showNotification('Không tìm thấy thông tin tài khoản!', 'error');
                        btn.disabled = false;
                        btn.innerHTML = originalContent;
                        return;
                    }
                    
                    if (userData.banned) {
                        await firebase.auth().signOut();
                        showNotification('Tài khoản của bạn đã bị khóa!', 'error');
                        btn.disabled = false;
                        btn.innerHTML = originalContent;
                        return;
                    }
                    
                    localStorage.setItem('currentUser', JSON.stringify({
                        uid,
                        username,
                        fullname: userData.fullname,
                        role: userData.role,
                        email: userData.email,
                        ip: userData.ip
                    }));
                    
                    showNotification('Đăng nhập thành công!', 'success');
                    
                    setTimeout(() => {
                        if (userData.role === 'admin' || userData.role === 'moderator') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = '../index.html';
                        }
                    }, 500);
                } catch (error) {
                    console.error('Login error:', error);
                    let errorMessage = 'Đã xảy ra lỗi. Vui lòng thử lại!';
                    
                    if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                        errorMessage = 'Tên đăng nhập hoặc mật khẩu không đúng!';
                    } else if (error.code === 'auth/too-many-requests') {
                        errorMessage = 'Quá nhiều lần thử. Vui lòng thử lại sau!';
                    } else if (error.code === 'auth/network-request-failed') {
                        errorMessage = 'Lỗi kết nối mạng. Vui lòng kiểm tra internet!';
                    }
                    
                    showNotification(errorMessage, 'error');
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                }
            });
        }

        // Initialize on DOMContentLoaded
        document.addEventListener('DOMContentLoaded', function() {
            initLoginForm();
            console.log('Login form initialized');
        });
        
        function showNotification(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeOutUp 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }
    </script>
    
    <style>
        .spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
