    <script>
    (function(){
      function reveal(){
        var h = document.documentElement;
        var b = document.body;
        if (h) h.style.visibility = 'visible';
        if (b) b.classList.add('theme-ready');
      }
      function setBodyBg(bg, scheme){
        try {
          var b = document.body;
          if (b) {
            b.style.backgroundColor = bg;
            b.style.colorScheme = scheme;
          }
        } catch(e) {}
      }
      try {
        var t = localStorage.getItem('skyedu_theme') || 'dark';
        var html = document.documentElement;
        var bg, scheme, pageBg;
        if (t === 'lightpremium') {
          html.classList.add('light','light-premium-mode');
          bg = '#FDF2F8'; scheme = 'light'; pageBg = '#FDF2F8';
        } else {
          html.classList.add('dark-mode');
          bg = '#0D1117'; scheme = 'dark'; pageBg = '#050B1A';
        }
        html.style.backgroundColor = bg;
        html.style.colorScheme = scheme;
        var applyBody = function(){ setBodyBg(pageBg, scheme); };
        if (document.body) applyBody();
        else document.addEventListener('DOMContentLoaded', applyBody);
        html.style.visibility = 'hidden';
        var wrappedReveal = function(){
          applyBody();
          reveal();
        };
        window.addEventListener('skyEduThemeApplied', wrappedReveal);
        window.addEventListener('load', function(){ setTimeout(wrappedReveal, 80); });
        setTimeout(wrappedReveal, 600);
      } catch(e) {}
    })();
    </script>

    </style>
    <script>
      (function(){
        function show(){
          var b = document.body; if (b) b.classList.add('theme-ready');
        }
        document.addEventListener('DOMContentLoaded', function(){
          requestAnimationFrame(function(){ requestAnimationFrame(show); });
        });
        window.addEventListener('load', show);
        setTimeout(show, 800);
      })();
    </script>

    <script>
        function initLoginForm() {
            const form = document.getElementById('loginForm');
            if (!form) return;
            
            const newForm = form.cloneNode(true);
            form.parentNode.replaceChild(newForm, form);
            
            newForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const username = document.getElementById('username').value.trim().toLowerCase();
                const password = document.getElementById('password').value.trim();
                const btn = document.getElementById('loginBtn');
                const originalContent = btn.innerHTML;

                if (!username || !password) {
                    showNotification('Vui lòng nhập đầy đủ thông tin!', 'error');
                    return;
                }

                btn.disabled = true;
                btn.innerHTML = '<iconify-icon icon="lucide:loader-2" class="spin" aria-hidden="true"></iconify-icon> Đang đăng nhập...';

                try {
                    const email = username + '@skyedu.id.vn';
                    const result = await FirebaseAPI.loginUser(email, password);

                    if (!result.success) {
                        showNotification(result.rateLimited ? 'Quá nhiều lần thử. Vui lòng thử lại sau!' : (result.error || 'Đăng nhập thất bại'), 'error');
                        btn.disabled = false;
                        btn.innerHTML = originalContent;
                        return;
                    }

                    const userData = result.userData;
                    const uid = userData.uid;

                    if (typeof SessionSecurity !== 'undefined' && typeof RoleSystem !== 'undefined') {
                        const normalized = RoleSystem.normalize(userData);
                        SessionSecurity.saveSession(normalized);
                    } else if (typeof SessionSecurity !== 'undefined') {
                        SessionSecurity.saveSession(userData);
                    } else {
                        localStorage.setItem('currentUser', JSON.stringify(userData));
                    }

                    showNotification('Đăng nhập thành công!', 'success');

                    setTimeout(() => {
                        const roles = Array.isArray(userData.roles) ? userData.roles : (userData.role ? [userData.role] : []);
                        if (typeof RoleSystem !== 'undefined' ? RoleSystem.hasAnyRole(userData, ['admin','owner','qtv']) : (userData.role === 'admin' || userData.role === 'owner' || userData.role === 'qtv')) {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = '../index.html';
                        }
                    }, 800);
                } catch (error) {
                    console.error('Login error:', error);
                    showNotification('Đã xảy ra lỗi. Vui lòng thử lại!', 'error');
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            initLoginForm();
        });
        
        function showNotification(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeOutUp 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }
    </script>

                if (typeof SessionSecurity !== 'undefined' && typeof SessionSecurity.getSession === 'function') {

                } catch (e) {
                    return null;

                            </span>
                        </div>
                        <button type="button" class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Mở menu" title="Mở menu">
                            <span></span><span></span><span></span>
                        </button>
                    `;
                }
            }

            function escapeHtml(s) {
                return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
                    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
                });
            }

            function performLogout() {
                if (typeof SessionSecurity !== 'undefined' && typeof SessionSecurity.clearSession === 'function') {
                    SessionSecurity.clearSession();
                } else {
                    localStorage.removeItem('currentUser');
                }
                try { localStorage.removeItem('sky_users'); sessionStorage.clear(); } catch(e) {}

                if (typeof firebase !== 'undefined' && firebase.auth) {
                    firebase.auth().signOut().catch(function(e) { console.warn('signOut error:', e); })
                        .finally(function() { window.location.href = '../account/dang-nhap.html'; });
                } else {
                    window.location.href = '../account/dang-nhap.html';
                }
            }

            document.addEventListener('click', function(e) {
                const mobileBtn = e.target.closest('#mobileMenuBtn');
                const navCenter = document.querySelector('.nav-center');
                if (mobileBtn && navCenter) {
                    navCenter.classList.toggle('active');
                    mobileBtn.classList.toggle('active');
                }
            });

            updateNavAuthState();
            window.addEventListener('userLogin', updateNavAuthState);
            window.addEventListener('userLogout', updateNavAuthState);
            window.addEventListener('storage', function(e) {
                if (e.key === 'currentUser' || e.key === 'skyedu_session') {
                    updateNavAuthState();
                }
            });
            window.addEventListener('themeChange', updateNavAuthState);
            window.updateNavAuthState = updateNavAuthState;
        })();
    </script>
</body>
</html>
